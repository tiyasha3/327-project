<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employer Dashboard — KarmoBD</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .dash-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 2rem;
    }

    /* ── Welcome banner ── */
    .emp-banner {
      background: linear-gradient(135deg, #0d4f32, #1E8A5E);
      border-radius: 20px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .emp-banner h2 { color: white; font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .emp-banner p  { color: rgba(255,255,255,0.75); font-size: 14px; }

    /* ── Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 20px;
      text-align: center;
    }
    .stat-num   { font-family:'Sora',sans-serif; font-size:28px; font-weight:800; color:var(--green); }
    .stat-label { font-size:13px; color:var(--muted); margin-top:4px; }

    /* ── Section title row ── */
    .section-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .section-row h3 { font-size: 18px; font-weight: 800; color: var(--text); }

    /* ── My Jobs list ── */
    .my-job-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 20px 24px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 16px;
      align-items: center;
      transition: all 0.2s;
    }
    .my-job-card:hover { border-color: var(--green); box-shadow: var(--shadow); }
    .my-job-card.closed { opacity: 0.55; }

    .mjc-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .mjc-title  { font-family:'Sora',sans-serif; font-size:15px; font-weight:700; margin-bottom:3px; }
    .mjc-meta   { font-size:13px; color:var(--muted); }
    .mjc-actions { display:flex; gap:8px; flex-shrink:0; }

    .btn-sm {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      border: 1.5px solid var(--border-gray);
      background: white;
      color: var(--text);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-sm:hover { border-color: var(--green); color: var(--green); }
    .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }
    .btn-sm.primary { background: var(--green); color: white; border-color: var(--green); }
    .btn-sm.primary:hover { background: var(--green-dark); }

    /* ── Applicants panel ── */
    .applicants-panel {
      display: none;
      background: var(--bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      margin-top: -8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .applicants-panel.open { display: block; }

    .panel-header {
      padding: 14px 20px;
      background: var(--green-light);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 700;
      color: var(--green-dark);
    }

    .applicant-row {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-gray);
      background: var(--white);
      transition: background 0.15s;
    }
    .applicant-row:last-child { border-bottom: none; }
    .applicant-row:hover { background: var(--bg); }

    .app-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: white; flex-shrink: 0;
      overflow: hidden;
    }
    .app-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .app-name    { font-size:14px; font-weight:700; margin-bottom:2px; }
    .app-message { font-size:12px; color:var(--muted); line-height:1.4; }
    .profile-link { color: var(--green); font-size: 12px; font-weight: 700; margin-left: 8px; }

    .status-select {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1.5px solid var(--border-gray);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      cursor: pointer;
      outline: none;
      background: white;
      transition: border-color 0.2s;
    }
    .status-select:focus { border-color: var(--green); }
    .status-select.pending  { color: #92400E; }
    .status-select.reviewed { color: #3730A3; }
    .status-select.accepted { color: var(--green-dark); }
    .status-select.rejected { color: #991B1B; }

    .empty-panel {
      padding: 30px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 4px;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
      width: fit-content;
    }
    .tab {
      padding: 8px 20px;
      border-radius: 7px; border: none;
      background: transparent;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      font-weight: 500; cursor: pointer;
      color: var(--muted); transition: all 0.2s;
    }
    .tab.active { background: var(--white); color: var(--green); font-weight:700; box-shadow:0 1px 6px rgba(0,0,0,0.08); }

    .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-state .empty-icon { font-size:48px; margin-bottom:16px; }
    .empty-state h3 { font-size:18px; font-weight:700; color:var(--text); margin-bottom:8px; }

    @media (max-width: 640px) {
      .my-job-card { grid-template-columns: 40px 1fr; }
      .mjc-actions { grid-column: 1/-1; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="logo-text">Karmo<span>BD</span></div>
  </a>
  <div class="nav-links">
    <a href="jobs.html">Browse Jobs</a>
    <a href="post_job.html">Post a Job</a>
    <a href="employer_dashboard.html" class="active">Dashboard</a>
    <a href="messages.html">Messages</a>
    <a href="profile.html">Profile</a>
  </div>
  <div class="nav-ctas">
    <span style="font-size:14px;color:var(--muted);">Hi, <strong id="navName" style="color:var(--text);">—</strong></span>
    <a href="#" onclick="logout()" class="btn btn-outline">Logout</a>
  </div>
</nav>

<div class="dash-wrap">

  <!-- Welcome banner -->
  <div class="emp-banner">
    <div>
      <h2>Employer Dashboard 🏢</h2>
      <p>Manage your job posts and review applications from talented teenagers.</p>
    </div>
    <a href="post_job.html" class="btn btn-white btn-lg">+ Post New Job</a>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statJobs">–</div><div class="stat-label">Jobs Posted</div></div>
    <div class="stat-card"><div class="stat-num" id="statApps" style="color:var(--amber);">–</div><div class="stat-label">Total Applicants</div></div>
    <div class="stat-card"><div class="stat-num" id="statPending" style="color:var(--amber);">–</div><div class="stat-label">Pending Review</div></div>
    <div class="stat-card"><div class="stat-num" id="statAccepted" style="color:var(--green);">–</div><div class="stat-label">Accepted</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="filterTab(this,'all')">All Jobs</button>
    <button class="tab" onclick="filterTab(this,'open')">Open</button>
    <button class="tab" onclick="filterTab(this,'closed')">Closed</button>
  </div>

  <!-- My jobs section -->
  <div class="section-row">
    <h3>My Job Posts</h3>
    <a href="post_job.html" class="btn btn-primary" style="font-size:13px;">+ Post New Job</a>
  </div>

  <div id="myJobsList">
    <div style="text-align:center;padding:40px;color:var(--muted);">
      <div style="font-size:32px;margin-bottom:12px;">⏳</div>
      Loading your jobs…
    </div>
  </div>

</div>

<script>
const API = 'http://localhost/karmobd/backend';
const ICONS  = { 'Art':'🎨','Teaching':'📚','Photography':'📸','Tech':'💻','Delivery':'🛵','Outdoor':'🌱','Cooking':'🍳','Events':'🎪','Design':'🖥️','Music':'🎵','Cleaning':'🧹','General':'💼' };
const COLORS = ['#D6F5E8','#FEF3C7','#E8F4FD','#F0E8FD','#FDE8E8','#E8FDF0'];
const AV_COLORS = ['#1E8A5E','#7C3AED','#D97706','#DC2626','#2563EB','#0891B2'];
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function iconFor(cat){ return ICONS[cat]||'💼'; }
function initials(name){ return name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase(); }
function applicantAvatar(app){
  if (app.avatar) return `<img src="${esc(app.avatar)}" alt="${esc(app.name||'Applicant')}">`;
  return initials(app.name||'?');
}

/* ── Auth ────────────────────────────────────── */
const storedName = localStorage.getItem('karmo_name');
const storedRole = localStorage.getItem('karmo_role');
const employerId = localStorage.getItem('karmo_id');
if (!storedName) { location.href = 'login.html'; }
if (storedRole !== 'employer') { location.href = 'my_applications.html'; }
document.getElementById('navName').textContent = storedName || '—';

function logout() {
  fetch(API+'/logout.php', { credentials: 'include' }).finally(()=>{ localStorage.clear(); location.href='index.html'; });
}

/* ── State ───────────────────────────────────── */
let allJobs  = [];
let activeTab = 'all';
let openPanel = null;   // job_id whose applicants are showing

/* ── Load employer's jobs ────────────────────── */
function loadMyJobs() {
  fetch(`${API}/employer_applications.php?employer_id=${employerId}`, { credentials: 'include' })
    .then(r => r.json())
    .then(data => {
      allJobs = data.jobs || [];
      const apps = data.applications || [];
      updateStats(allJobs, apps);
      renderJobs(allJobs);
    })
    .catch(() => {
      document.getElementById('myJobsList').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <h3>Could not load jobs</h3>
          <p>Make sure you are logged in and XAMPP is running.</p>
        </div>`;
    });
}

function updateStats(jobs, apps) {
  document.getElementById('statJobs').textContent    = jobs.length;
  document.getElementById('statApps').textContent    = apps.length;
  document.getElementById('statPending').textContent = apps.filter(a=>a.status==='pending').length;
  document.getElementById('statAccepted').textContent= apps.filter(a=>a.status==='accepted').length;
}

/* ── Tabs ────────────────────────────────────── */
function filterTab(btn, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeTab = tab;
  const filtered = tab === 'all' ? allJobs : allJobs.filter(j => j.status === tab);
  renderJobs(filtered);
}

/* ── Render job list ─────────────────────────── */
function renderJobs(jobs) {
  const list = document.getElementById('myJobsList');
  if (!jobs.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <h3>No jobs posted yet</h3>
        <p>Post your first job and start receiving applications from talented teens!</p>
        <a href="post_job.html" class="btn btn-primary" style="margin-top:20px;">Post Your First Job →</a>
      </div>`;
    return;
  }

  list.innerHTML = jobs.map((job, i) => {
    const icon  = iconFor(job.category);
    const color = COLORS[i % COLORS.length];
    const appCount = job.app_count || 0;
    const isClosed = job.status === 'closed' || job.status === 'filled';
    return `
      <div>
        <div class="my-job-card${isClosed?' closed':''}">
          <div class="mjc-icon" style="background:${color};">${icon}</div>
          <div>
            <div class="mjc-title">${esc(job.title)}</div>
            <div class="mjc-meta">
              📍 ${esc(job.location||'—')} &nbsp;·&nbsp;
              ৳ ${Number(job.salary||0).toLocaleString()} &nbsp;·&nbsp;
              <span style="color:${appCount>0?'var(--green)':'var(--muted)'};">
                ${appCount} applicant${appCount!==1?'s':''}
              </span> &nbsp;·&nbsp;
              <span class="tag ${isClosed?'gray':''}${!isClosed?'':'gray'}" style="font-size:11px;padding:2px 8px;">
                ${job.status||'open'}
              </span>
            </div>
          </div>
          <div class="mjc-actions">
            <button class="btn-sm primary" onclick="toggleApplicants(${job.job_id}, this)">
              👥 Applicants (${appCount})
            </button>
            <button class="btn-sm" onclick="toggleJobStatus(${job.job_id}, '${isClosed?'open':'closed'}', this)">
              ${isClosed ? '🟢 Reopen' : '🔴 Close'}
            </button>
          </div>
        </div>
        <div class="applicants-panel" id="panel-${job.job_id}"></div>
      </div>`;
  }).join('');
}

/* ── Toggle applicants panel ─────────────────── */
function toggleApplicants(jobId, btn) {
  const panel = document.getElementById('panel-' + jobId);
  const isOpen = panel.classList.contains('open');

  // close all panels first
  document.querySelectorAll('.applicants-panel').forEach(p => p.classList.remove('open'));

  if (!isOpen) {
    panel.classList.add('open');
    loadApplicants(jobId, panel);
  }
}

function loadApplicants(jobId, panel) {
  panel.innerHTML = `<div class="empty-panel">⏳ Loading applicants…</div>`;

  fetch(`${API}/employer_applications.php?employer_id=${employerId}&job_id=${jobId}`, { credentials: 'include' })
    .then(r => r.json())
    .then(data => {
      const apps = data.applications || [];
      if (!apps.length) {
        panel.innerHTML = `
          <div class="panel-header">Applicants for this job</div>
          <div class="empty-panel">No applications yet. Share your job link to attract more teens!</div>`;
        return;
      }
      panel.innerHTML = `
        <div class="panel-header">👥 ${apps.length} Applicant${apps.length!==1?'s':''} — click a status to update it</div>
        ${apps.map((app, i) => `
          <div class="applicant-row">
            <div class="app-avatar" style="background:${AV_COLORS[i%AV_COLORS.length]};">${applicantAvatar(app)}</div>
            <div>
              <div class="app-name">${esc(app.name)} <a class="profile-link" href="profile.html?user_id=${app.user_id}&job_id=${jobId}">View profile</a></div>
              <div class="app-message">${app.message ? esc(app.message.slice(0,100))+(app.message.length>100?'…':'') : '<em>No cover message</em>'}</div>
              ${app.status === 'accepted' ? `<div style="margin-top:6px;display:flex;gap:6px;">
                <a href="messages.html?with=${app.user_id}&job_id=${jobId}" class="btn-sm primary" style="text-decoration:none;">💬 Message</a>
                <a href="profile.html?user_id=${app.user_id}&job_id=${jobId}" class="btn-sm" style="text-decoration:none;">⭐ Rate</a>
              </div>` : ''}
            </div>
            <select class="status-select ${app.status||'pending'}"
              onchange="updateStatus(${app.app_id}, this)">
              <option value="pending"  ${app.status==='pending'  ?'selected':''}>🟡 Pending</option>
              <option value="reviewed" ${app.status==='reviewed' ?'selected':''}>🔵 Reviewing</option>
              <option value="accepted" ${app.status==='accepted' ?'selected':''}>🟢 Accept</option>
              <option value="rejected" ${app.status==='rejected' ?'selected':''}>🔴 Reject</option>
            </select>
          </div>`).join('')}`;
    })
    .catch(() => {
      panel.innerHTML = `<div class="empty-panel">⚠️ Could not load applicants.</div>`;
    });
}

/* ── Update application status ───────────────── */
function updateStatus(appId, sel) {
  const status = sel.value;
  sel.className = 'status-select ' + status;

  const fd = new FormData();
  fd.append('app_id', appId);
  fd.append('status', status);

  fetch(`${API}/update_application.php`, { method:'POST', body:fd, credentials:'include' })
    .then(r => r.text())
    .then(res => {
      if (!res.includes('success')) {
        alert('Could not update status. Please try again.');
      }
    })
    .catch(() => alert('Server error. Please check XAMPP is running.'));
}

/* ── Toggle job open/closed ──────────────────── */
function toggleJobStatus(jobId, newStatus, btn) {
  const fd = new FormData();
  fd.append('job_id', jobId);
  fd.append('status', newStatus);

  fetch(`${API}/update_job_status.php`, { method:'POST', body:fd, credentials:'include' })
    .then(r => r.text())
    .then(res => {
      if (res.includes('success')) loadMyJobs();
      else alert('Could not update job status.');
    })
    .catch(() => alert('Server error. Check XAMPP.'));
}

loadMyJobs();
</script>

</body>
</html>
